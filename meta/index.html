<!DOCTYPE html>
<html>
<head>
  <title>Meta Analysis</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>Codebase Analysis</h1>
<p>This page shows stats about my code.</p>

<div id="stats"></div>

<h2>Commits by time of day</h2>
<div id="chart"></div>

<div id="selection-summary"></div>

<div id="selection-breakdown"></div>



<dl id="commit-tooltip" class="info tooltip" hidden>
  <dt>Commit</dt>
  <dd><a id="commit-link" target="_blank"></a></dd>

  <dt>Date</dt>
  <dd id="commit-date"></dd>

  <dt>Time</dt>
  <dd id="commit-time"></dd>

  <dt>Author</dt>
  <dd id="commit-author"></dd>

  <dt>Lines</dt>
  <dd id="commit-lines"></dd>
</dl>


<script type="module" src="main.js"></script>

</body>
</html>
